version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: conexao-fitness-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: conexao_fitness
      POSTGRES_USER: conexao_user
      POSTGRES_PASSWORD: conexao_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
